<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youtube Player</title>
<link rel="shortcut icon" href="https://www.youtube.com/s/desktop/45b1dc52/img/favicon.ico" type="image/x-icon">

<style>
body{
  font-family: Arial, Tahoma, sans-serif;
  background:#f2f2f2;
  margin:0;
  padding:0;
  text-align:center;
  color:#222;
}

h1{
  font-size:20px;
  margin:20px 10px;
}

.box{
  background:#fff;
  width:92%;
  max-width:450px;
  margin:15px auto;
  padding:15px;
  border:1px solid #ddd;
  border-radius:6px;
}

input{
  width:90%;
  max-width:400px;
  padding:10px;
  font-size:15px;
  border:1px solid #ccc;
  border-radius:5px;
  outline:none;
}

button, a{
  display:block;
  width:85%;
  max-width:350px;
  margin:10px auto;
  padding:12px 10px;
  font-size:15px;
  border:1px solid #000;
  border-radius:5px;
  text-decoration:none;
  cursor:pointer;
}

button{
  background:#007bff;
  color:#fff;
}

.btn1{ background:#28a745; color:#fff; border-color:#1e7e34; }
.btn2{ background:#ff9800; color:#fff; border-color:#cc7a00; }
.btn3{ background:#444; color:#fff; border-color:#222; }

button:active, a:active{
  opacity:0.7;
}

iframe{
  width:100%;
  height:420px;
  border:0;
}

.note{
  font-size:13px;
  color:#555;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>بحث يوتيوب (للأجهزة الضعيفة)</h1>

<div class="box">
  <p>اكتب ما تريد البحث عنه:</p>

  <input id="q" type="text" placeholder="مثال: سورة البقرة" />

  <button onclick="doSearch()">بحث</button>

  <a id="openMobile" class="btn1" href="#" target="_blank">فتح النتائج في يوتيوب الخفيف</a>
  <a id="openNormal" class="btn2" href="#" target="_blank">فتح النتائج في يوتيوب العادي</a>
  <a id="openHttp" class="btn3" href="#" target="_blank">فتح النتائج (HTTP للأجهزة القديمة)</a>

  <p class="note">
    أفضل خيار للأجهزة الضعيفة: يوتيوب الخفيف (m.youtube).
  </p>
</div>

<div class="box" id="frameBox" style="display:none;">
  <p><b>عرض النتائج داخل الصفحة (قد لا يعمل على الأجهزة القديمة):</b></p>
  <iframe id="frame" src=""></iframe>
</div>


<script>
function encodeQuery(text){

  return escape(text);
}

function doSearch(){
  var q = document.getElementById("q").value;
  q = q.replace(/^\s+|\s+$/g, "");

  if(q == ""){
    alert("اكتب كلمة للبحث!");
    return;
  }

  var encoded = encodeQuery(q);

  var urlMobile = "https://m.youtube.com/results?search_query=" + encoded;
  var urlNormal = "https://www.youtube.com/results?search_query=" + encoded;
  var urlHttp   = "http://m.youtube.com/results?search_query=" + encoded;

  document.getElementById("openMobile").href = urlMobile;
  document.getElementById("openNormal").href = urlNormal;
  document.getElementById("openHttp").href = urlHttp;

  document.getElementById("frameBox").style.display = "block";
  document.getElementById("frame").src = urlMobile;
}
</script>

</body>
</html>
